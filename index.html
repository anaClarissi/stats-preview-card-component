<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="html, css">
  <meta name="author" content="Ana Clarissi">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Stats preview card component</title>

  <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>

  <main class="container">

    <section class="content">

      <header class="content__img">

        <article class="content__img__background"></article>

      </header>

      <section class="content__text">


        <h1>Get <span>insights</span> that help your business grow.</h1>

        <p>
          Discover the benefits of data analytics and make better decisions regarding revenue, customer
          experience, and overall efficiency.
        </p>

        <article class="content__text__info">

          <article>
            
            <p class="content__text__info__number">10k+</p>
            
            <p class="content__text__info__desc">companies</p>

          </article>

          <article>
            
            <p class="content__text__info__number">314</p>
            
            <p class="content__text__info__desc">templates</p>

          </article>

          <article>
            
            <p class="content__text__info__number">12m+</p>
            
            <p class="content__text__info__desc">queries</p>

          </article>

        </article>

      </section>

    </section>

  </main>

</body>
</html>
